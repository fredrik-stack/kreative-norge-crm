name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: crm_db
          POSTGRES_USER: crm
          POSTGRES_PASSWORD: crm_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crm -d crm_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_DEBUG: "True"
      DJANGO_SECRET_KEY: "ci-secret-key"
      DB_NAME: crm_db
      DB_USER: crm
      DB_PASSWORD: crm_password
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
      SMOKE_USERNAME: "smoke-ci"
      SMOKE_PASSWORD: "Smoke1234!"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run Django tests
        run: python manage.py test crm.tests -v 2

      - name: Apply migrations for smoke DB
        run: python manage.py migrate --noinput

      - name: Run editor API smoke test
        run: python scripts/smoke_editor_api.py --tenant-id 1 --username "$SMOKE_USERNAME" --password "$SMOKE_PASSWORD"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend checks (tests + build)
        run: npm run ci:check

  frontend-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: crm_db
          POSTGRES_USER: crm
          POSTGRES_PASSWORD: crm_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crm -d crm_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_DEBUG: "True"
      DJANGO_SECRET_KEY: "ci-secret-key"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      DB_NAME: crm_db
      DB_USER: crm
      DB_PASSWORD: crm_password
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install backend dependencies
        run: pip install -r requirements.txt
        working-directory: .

      - name: Apply backend migrations
        run: python manage.py migrate --noinput
        working-directory: .

      - name: Start backend server
        run: nohup python manage.py runserver 127.0.0.1:8000 > backend.log 2>&1 &
        working-directory: .

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:8000/api/auth/session/ > /dev/null; then
              echo "Backend is up"
              exit 0
            fi
            sleep 1
          done
          echo "Backend failed to start"
          exit 1
        working-directory: .

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            frontend/playwright-report
            frontend/test-results
            backend.log
          if-no-files-found: ignore
